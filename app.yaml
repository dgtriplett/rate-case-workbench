command:
  - "python"
  - "-m"
  - "uvicorn"
  - "backend.app:app"
  - "--host"
  - "0.0.0.0"
  - "--port"
  - "8000"

env:
  - name: DRAFTER_MODEL
    value: databricks-claude-sonnet-4-6
  - name: SUMMARIZER_MODEL
    value: databricks-claude-haiku-4-5
  - name: POSITION_CHECKER_MODEL
    value: databricks-claude-sonnet-4-6
  - name: EMBEDDING_MODEL
    value: databricks-gte-large-en
  - name: VS_ENDPOINT
    value: rcw-vs
  - name: CATALOG
    value: grid_ops_demo_catalog
  - name: APP_SCHEMA
    value: rcw_app
  - name: KNOWLEDGE_SCHEMA
    value: rcw_knowledge
  - name: AUDIT_SCHEMA
    value: rcw_audit
  - name: TABULAR_SCHEMA
    value: rcw_tabular
  - name: DOCS_VOLUME
    value: /Volumes/grid_ops_demo_catalog/rcw_knowledge/docs_raw
